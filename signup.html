<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | MeloSave</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>



<!-- NAVBAR -->

<header>

    <nav class="navbar">

        <h2 class="logo">
            MeloSave 💜
        </h2>


        <button id="themeToggle">
            🌙
        </button>

    </nav>

</header>





<!-- SIGNUP SECTION -->


<section class="form-section">


    <div class="form-card">


        <h1>
            Create Your Account 💜
        </h1>


        <p>
            Thank you for choosing MeloSave.
            Start managing your money smarter.
        </p>





        <form id="signupForm">


            <input 
            type="text"
            id="signupName"
            placeholder="Full Name"
            required>



            <input 
            type="email"
            id="signupEmail"
            placeholder="Email Address"
            required>





            <select id="signupGender" required>

                <option value="">
                    Select Gender
                </option>


                <option value="male">
                    Male 🔵
                </option>


                <option value="female">
                    Female 🟣
                </option>


            </select>






            <input 
            type="password"
            id="signupPin"
            placeholder="Create PIN"
            maxlength="6"
            required>





            <button type="submit" class="btn">

                Create Account

            </button>



        </form>





        <p class="switch-text">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </p>



    </div>


</section>







<!-- FOOTER -->


<footer>


    <h3>
        MeloSave 💜
    </h3>


    <p>
        Save smarter. Live better.
    </p>


    <p>
        © 2026 MeloSave. All rights reserved.
    </p>


</footer>







<script src="script.js"></script>


</body>

</html>
