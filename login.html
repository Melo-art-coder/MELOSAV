<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | MeloSave</title>

    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="theme.css">
</head>


<body>




<!-- NAVBAR -->

<header>

    <nav class="navbar">


        <h2 class="logo">
            MeloSave 💜
        </h2>



        <button id="themeToggle">
            🌙
        </button>


    </nav>

</header>







<!-- LOGIN SECTION -->


<section class="form-section">


    <div class="form-card">



        <h1>
            Welcome Back 💜
        </h1>



        <p>
            Login to continue managing
            your money.
        </p>






        <form id="loginForm">



            <input
            type="email"
            id="loginEmail"
            placeholder="Email Address"
            required>






            <input
            type="password"
            id="loginPin"
            placeholder="Enter PIN"
            maxlength="6"
            required>







            <button 
            type="submit"
            class="btn">

                Login

            </button>



        </form>






        <p class="switch-text">


            Don't have an account?


            <a href="signup.html">
                Create Account
            </a>


        </p>





    </div>



</section>








<!-- FOOTER -->


<footer>


    <h3>
        MeloSave 💜
    </h3>


    <p>
        Save smarter. Live better.
    </p>


    <p>
        © 2026 MeloSave. All rights reserved.
    </p>


</footer>







<script src="script.js"></script>


</body>

</html>
