<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MeloSave Icon Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f8f5ff;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(108, 62, 244, 0.1);
            text-align: center;
            max-width: 400px;
        }
        h2 { color: #6C3EF4; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .btn {
            display: block;
            width: 100%;
            background: #6C3EF4;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .btn:hover { background: #4A24B8; transform: translateY(-2px); }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>MeloSave Icon Generator 💜</h2>
        <p>Click the buttons below to instantly download your official PWA app icons. No screenshots needed!</p>
        
        <button class="btn" onclick="generateAndDownload(192, 'icon-192.png')">Download icon-192.png</button>
        <button class="btn" onclick="generateAndDownload(512, 'icon-512.png')">Download icon-512.png</button>
    </div>

    <canvas id="iconCanvas"></canvas>

    <script>
        function generateAndDownload(size, filename) {
            const canvas = document.getElementById('iconCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = size;
            canvas.height = size;

            // 1. Create Purple Gradient Background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#6C3EF4');
            gradient.addColorStop(1, '#4A24B8');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            // 2. Draw the White "M" 
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `bold ${size * 0.45}px sans-serif`;
            ctx.fillText('M', size / 2, size * 0.42);

            // 3. Draw the Purple Heart "💜"
            ctx.font = `${size * 0.18}px sans-serif`;
            ctx.fillText('💜', size / 2, size * 0.75);

            // 4. Force Download the PNG
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
