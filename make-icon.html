<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MeloSave PWA Icon Generator</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8f5ff;
      gap: 30px;
      padding: 50px;
      font-family: 'Poppins', sans-serif;
      color: #333;
    }
    
    .container {
      display: flex;
      gap: 50px;
      align-items: flex-end;
    }

    .label {
      text-align: center;
      font-weight: 600;
      margin-bottom: 10px;
      color: #6C3EF4;
    }

    /* The MeloSave App Icon Styling */
    .melosave-icon {
      background: linear-gradient(135deg, #6C3EF4 0%, #4A24B8 100%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 22%; /* Standard squircle look for mobile apps */
      position: relative;
      box-shadow: 0 15px 35px rgba(108, 62, 244, 0.4);
      overflow: hidden;
      user-select: none;
    }

    /* Outer glowing border effect */
    .melosave-icon::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 22%;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .icon-192 {
      width: 192px;
      height: 192px;
    }

    .icon-512 {
      width: 512px;
      height: 512px;
    }

    /* Logo Text Branding */
    .logo-text-192 {
      font-size: 85px;
      font-weight: 700;
      line-height: 1;
      margin-top: 10px;
    }
    
    .logo-text-512 {
      font-size: 230px;
      font-weight: 700;
      line-height: 1;
      margin-top: 25px;
    }

    /* Logo Heart Branding */
    .heart-192 {
      font-size: 32px;
      margin-top: -5px;
    }

    .heart-512 {
      font-size: 85px;
      margin-top: -15px;
    }
  </style>
</head>
<body>

  <h1>MeloSave App Icon Generator 💜</h1>
  <p>Take a precise screenshot of each square below to create your <b>icon-192.png</b> and <b>icon-512.png</b>!</p>

  <div class="container">
    <div>
      <div class="label">192 x 192 Pixels</div>
      <div class="melosave-icon icon-192">
        <div class="logo-text-192">M</div>
        <div class="heart-192">💜</div>
      </div>
    </div>

    <div>
      <div class="label">512 x 512 Pixels</div>
      <div class="melosave-icon icon-512">
        <div class="logo-text-512">M</div>
        <div class="heart-512">💜</div>
      </div>
    </div>
  </div>

</body>
</html>
