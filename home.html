<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | MeloSave V3</title>

    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="dashboard-v3.css">
</head>

<body>

<header class="home-header">

    <div class="welcome">

        <p class="hello">
            Welcome back 👋
        </p>

        <h1 id="welcomeMessage">
            Good Morning
        </h1>

    </div>

    <div class="header-buttons">

        <button class="header-btn" id="themeToggle">
            ☀️
        </button>

        <button class="header-btn">
            🔔
        </button>

    </div>

</header>

<section class="balance-card">

    <div class="balance-top">

        <p class="balance-label">
            Total Balance
        </p>

        <span class="currency">
            NGN
        </span>

    </div>

    <h2 id="balance">
        ₦0
    </h2>

    <div class="balance-bottom">

        <div>
            <small>Income</small>
            <h3 id="incomeAmount">₦0</h3>
        </div>

        <div>
            <small>Savings</small>
            <h3 id="savingAmount">₦0</h3>
        </div>

    </div>

</section>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

    <a href="home.html" class="nav-item active">
        <span>🏠</span>
        <small>Home</small>
    </a>

    <a href="#" class="nav-item">
    <span>🎯</span>
    <small>Goals</small>
</a>

    <button class="fab" id="addBtn">
    ＋
</button>

    <a href="#" class="nav-item">
    <span>📊</span>
    <small>Stats</small>
</a>

    <a href="profile.html" class="nav-item">
        <span>👤</span>
        <small>Profile</small>
    </a>

</nav>
<div id="transactionModal" class="modal">

    <div class="modal-content">

        <h2>Add Transaction</h2>

        <select id="transactionType">
            <option value="income">Income</option>
            <option value="saving">Savings</option>
        </select>

        <input
            type="number"
            id="amount"
            placeholder="Enter amount">

        <input
            type="text"
            id="description"
            placeholder="Description (Optional)">

        <button id="saveTransaction">
            Save
        </button>

    </div>

</div>

<script src="storage.js"></script>
<script src="profile.js"></script>
<script src="notifications.js"></script>
<script src="theme.js"></script>
<script src="auth.js"></script>
<script src="home.js"></script>
<script src="transactions.js"></script>
<script src="budget.js"></script>
<script src="script.js"></script>
</body>
</html>
