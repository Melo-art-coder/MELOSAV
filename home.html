<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | MeloSave V3</title>

    <link rel="stylesheet" href="dashboard-v3.css">
</head>

<body>
<header class="top-bar">

    <div class="user-info">

        <p class="greeting">
            👋 Good Evening,
        </p>

        <h1 class="username">
            Melody
        </h1>

    </div>

    <div class="top-actions">

        <button class="icon-btn">
            🔔
        </button>

        <button class="icon-btn" id="themeToggle">
            🌙
        </button>

    </div>

</header>



<section class="balance-card">

    <p class="balance-title">
        Available Balance
    </p>

    <h2 class="balance-amount">
        ₦0.00
    </h2>

    <p class="balance-change">
        ▲ Ready to grow your savings 💜
    </p>

</section>
</body>

<script src="script.js"></script>
</html>
