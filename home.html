<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | MeloSave V3</title>

    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="dashboard-v3.css">
</head>

<body>

<header class="home-header">

    <div class="welcome">

        <p class="hello">
            Welcome back 👋
        </p>

        <h1 id="welcomeMessage">
            Good Morning
        </h1>

    </div>

    <div class="header-buttons">

        <button class="header-btn" id="themeToggle">
            ☀️
        </button>

        <button class="header-btn">
            🔔
        </button>

    </div>

</header>

<section class="balance-card">

    <div class="balance-top">

        <p class="balance-label">
            Total Balance
        </p>

        <span class="currency">
            NGN
        </span>

    </div>

    <h2 id="balance">
        ₦0
    </h2>

    <div class="balance-bottom">

        <div>
            <small>Income</small>
            <h3 id="incomeAmount">₦0</h3>
        </div>

        <div>
            <small>Savings</small>
            <h3 id="savingAmount">₦0</h3>
        </div>

    </div>

</section>
<section class="quick-actions">

    <h2 class="section-title">
        Quick Actions
    </h2>

    <div class="action-grid">

        <button class="action-card" id="airtimeBtn">

            <div class="action-icon">📱</div>

            <h3>Data & Airtime</h3>

            <p>Recharge</p>

        </button>

        <button class="action-card" id="bettingBtn">

            <div class="action-icon">🎲</div>

            <h3>Betting</h3>

            <p>Fund Wallet</p>

        </button>

        <button class="action-card" id="transferBtn">

            <div class="action-icon">💸</div>

            <h3>Transfer</h3>

            <p>Send Money</p>

        </button>

        <button class="action-card" id="savingBtn">

            <div class="action-icon">🏦</div>

            <h3>Savings</h3>

            <p>Goals</p>

        </button>

    </div>

</section>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

    <a href="home.html" class="nav-item active">
        <span>🏠</span>
        <small>Home</small>
    </a>

    <a href="#" class="nav-item">
    <span>🎯</span>
    <small>Goals</small>
</a>

    <button class="fab" id="addBtn">
    ＋
</button>

    <a href="#" class="nav-item">
    <span>📊</span>
    <small>Stats</small>
</a>

    <a href="profile.html" class="nav-item">
        <span>👤</span>
        <small>Profile</small>
    </a>

</nav>
<div id="transactionModal" class="modal">

    <div class="modal-content">

        <h2>Add Transaction</h2>

        <select id="transactionType">
            <option value="income">Income</option>
            <option value="saving">Savings</option>
        </select>

        <input
            type="number"
            id="amount"
            placeholder="Enter amount">

        <input
            type="text"
            id="description"
            placeholder="Description (Optional)">

        <button id="saveTransaction">
            Save
        </button>

    </div>

</div>
<!-- Transfer Modal -->
<div id="transferModal" class="modal">

    <div class="modal-content">

        <h2>💸 Transfer Money</h2>

        <label>Bank</label>

        <select id="transferBank">

            <option>Access Bank</option>
            <option>GTBank</option>
            <option>First Bank</option>
            <option>UBA</option>
            <option>Zenith Bank</option>
            <option>Opay</option>
            <option>Moniepoint</option>
            <option>Palmpay</option>

        </select>

        <label>Account Number</label>

        <input
    type="text"
    id="accountNumber"
    maxlength="10"
    inputmode="numeric"
    placeholder="Enter 10-digit account number">

        <label>Recipient Name</label>

<input
    type="text"
    id="recipientName"
    placeholder="Enter recipient name">

<label>Amount</label>

<input
    type="number"
    id="transferAmount"
    placeholder="₦0">

        <label>Narration</label>

        <input
            type="text"
            id="transferNarration"
            placeholder="Optional">

        <button id="continueTransfer">

            Continue

        </button>

    </div>

</div>
<!-- Transfer Success Modal -->

<div id="successModal" class="modal">

    <div class="modal-content success-box">

        <h2>✅ Transfer Successful</h2>

        <p id="receiptDetails">
            Your transfer was completed.
        </p>


        <button id="shareReceipt">
            📤 Share Receipt
        </button>


        <button id="viewTransactions">
            📄 Recent Transactions
        </button>
<button id="closeReceipt">
    ✅ Done
</button>


    </div>

</div>
<!-- Data & Airtime Modal -->

<div id="airtimeModal" class="modal">

    <div class="modal-content">

        <h2>📱 Buy Airtime & Data</h2>

        <label>Service</label>

        <select id="serviceType">
            <option value="airtime">Airtime</option>
            <option value="data">Data</option>
        </select>

        <label>Network</label>

        <select id="network">

            <option>MTN</option>
            <option>Airtel</option>
            <option>Glo</option>
            <option>9mobile</option>

        </select>

        <label>Phone Number</label>

        <input
            type="tel"
            id="phoneNumber"
            maxlength="11"
            placeholder="08012345678">

        <label>Amount</label>

        <input
            type="number"
            id="airtimeAmount"
            placeholder="₦0">

        <button id="buyAirtime">

            Continue

        </button>

    </div>

</div>

<script src="storage.js"></script>
<script src="notifications.js"></script>
<script src="auth.js"></script>
<script src="transactions.js"></script>
<script src="budget.js"></script>
<script src="profile.js"></script>
<script src="welcome.js"></script>
<script src="theme.js"></script>
<script src="transfer.js"></script>
<script src="home.js"></script>
</body>
</html>
