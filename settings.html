<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings | MeloSave</title>

<link rel="stylesheet" href="home.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="home-header">

<h1>⚙️ Settings</h1>

<a href="home.html" class="btn">
← Back
</a>

</header>

<section class="settings-container">

<div class="settings-card">

<h3>🎨 Appearance</h3>

<p>Choose your favorite theme.</p>

<select id="themeSelector">

<option value="purple">💜 Melo Purple</option>

<option value="emerald">💚 Emerald Money</option>

<option value="ocean">💙 Ocean Blue</option>

<option value="midnight">🖤 Midnight</option>

<option value="sunset">🧡 Sunset</option>

<option value="rose">🩷 Rose Gold</option>

</select>

</div>

<div class="settings-card">

<h3>🌙 Dark Mode</h3>

<label>

<input
type="checkbox"
id="darkModeSwitch">

Enable Dark Mode

</label>

</div>

<div class="settings-card">

<h3>🔔 Notifications</h3>

<label>

<input
type="checkbox"
id="notificationSwitch"
checked>

Savings Reminders

</label>

</div>

<div class="settings-card">

<h3>🔐 Security</h3>

<button class="btn">

Create App PIN

</button>

</div>

<div class="settings-card">

<h3>ℹ️ About MeloSave</h3>

<p>

Version 3.0 Premium

</p>

</div>

</section>

<script src="storage.js"></script>
<script src="theme.js"></script>
<script src="settings.js"></script>

</body>

</html>
