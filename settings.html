<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings | MeloSave</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="settings.css">
<link rel="stylesheet" href="theme.css">

</head>

<body>



<header class="settings-header">

    <a href="home.html" class="back-btn">←</a>

    <h1>Settings</h1>

</header>

<div class="settings-container">

    <div class="settings-card">

        <h3>👤 Account</h3>

        <p>Edit your profile information.</p>

        <button id="editProfileBtn" class="settings-btn">
            Edit Profile
        </button>

    </div>
<div class="settings-card">

    <h3>🌞 Appearance</h3>

    <p>Choose Light or Dark Mode.</p>

    <label class="switch">

        <input type="checkbox" id="darkModeSwitch">

        <span class="slider"></span>

    </label>

</div>

        <div class="settings-card">

    <h3>🎨 App Theme</h3>

    <p>Choose your favorite color.</p>

    <div class="theme-grid">

        <button class="theme-option" data-theme="purple">
            💜
            <span>Purple</span>
        </button>

        <button class="theme-option" data-theme="emerald">
            💚
            <span>Emerald</span>
        </button>

        <button class="theme-option" data-theme="ocean">
            💙
            <span>Ocean</span>
        </button>

        <button class="theme-option" data-theme="rose">
            🩷
            <span>Rose</span>
        </button>

        <button class="theme-option" data-theme="gold">
            💛
            <span>Gold</span>
        </button>

        <button class="theme-option" data-theme="midnight">
            🌙
            <span>Midnight</span>
        </button>

    </div>

</div>
<div class="settings-card">

    <h3>🔔 Notifications</h3>

    <label>

        <input type="checkbox" id="notificationSwitch">

        Enable Notifications

    </label>

</div>

    <div class="settings-card">

        <h3>🔐 Security</h3>

        <button class="settings-btn">

            Set PIN

        </button>

    </div>

    <div class="settings-card">

        <h3>🤖 Melo AI</h3>

        <label>

            <input type="checkbox" id="voiceSwitch">

            Voice Assistant

        </label>

    </div>

    <div class="settings-card">

    <h3>ℹ️ About</h3>

    <p>
        MELOSAV V5
        <br>
        Save Smarter. Manage Better.
    </p>

    </div>

</div>
<div class="settings-card">

    <button id="logoutBtn">

        🚪 Log Out

    </button>

</div>
<script src="storage.js"></script>
<script src="auth.js"></script>
<script src="theme.js"></script>
<script src="settings.js"></script>

</body>

</html>
