<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings | MeloSave</title>

<link rel="stylesheet" href="home.css">
<link rel="stylesheet" href="style.css">

</head>

<body>



<header class="settings-header">

    <a href="home.html" class="back-btn">←</a>

    <h1>Settings</h1>

</header>

<div class="settings-container">

    <div class="settings-card">

        <h3>👤 Account</h3>

        <p>Edit your profile information.</p>

        <button id="editProfileBtn" class="settings-btn">
            Edit Profile
        </button>

    </div>

    <div class="settings-card">

        <h3>🎨 App Theme</h3>

        <select id="themeSelector">

            <option value="purple">💜 Melo Purple</option>

            <option value="emerald">💚 Emerald Money</option>

            <option value="ocean">💙 Ocean Blue</option>

            <option value="midnight">🌑 Midnight</option>

            <option value="rose">🌸 Rose Pink</option>

            <option value="gold">🟨 Royal Gold</option>

        </select>

    </div>

    <div class="settings-card">

        <h3>🔔 Notifications</h3>

        <label>

            <input type="checkbox" id="notificationSwitch">

            Enable Notifications

        </label>

    </div>

    <div class="settings-card">

        <h3>🔐 Security</h3>

        <button class="settings-btn">

            Set PIN

        </button>

    </div>

    <div class="settings-card">

        <h3>🤖 Melo AI</h3>

        <label>

            <input type="checkbox" id="voiceSwitch">

            Voice Assistant

        </label>

    </div>

    <div class="settings-card">

        <h3>ℹ️ About</h3>

        <p>MELOSAV Version 3.0</p>

    </div>

</div>

<script src="storage.js"></script>
<script src="theme.js"></script>
<script src="settings.js"></script>

</body>

</html>
