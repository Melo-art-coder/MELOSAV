<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings | MeloSave</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="settings.css">
<link rel="stylesheet" href="theme.css">

</head>

<body>



<header class="settings-header">

    <a href="home.html" class="back-btn">←</a>

    <h1>Settings</h1>

</header>

<div class="settings-container">

    <div class="settings-card">

        <h3>👤 Account</h3>

        <p>Edit your profile information.</p>

        <button id="editProfileBtn" class="settings-btn">
            Edit Profile
        </button>

    </div>

    <div class="settings-card">

        <h3>🎨 App Theme</h3>

        <div class="settings-card">

    <h3>🎨 Choose Theme</h3>

    <div class="theme-grid">

        <button class="theme-option purple" data-theme="purple">
            💜 Melo Purple
        </button>

        <button class="theme-option emerald" data-theme="emerald">
            💚 Emerald Money
        </button>

        <button class="theme-option ocean" data-theme="ocean">
            💙 Ocean Blue
        </button>

        <button class="theme-option midnight" data-theme="midnight">
            🌑 Midnight
        </button>

        <button class="theme-option rose" data-theme="rose">
            🌸 Rose Pink
        </button>

        <button class="theme-option gold" data-theme="gold">
            🟨 Royal Gold
        </button>

    </div>

</div>

    <div class="settings-card">

        <h3>🔔 Notifications</h3>

        <label>

            <input type="checkbox" id="notificationSwitch">

            Enable Notifications

        </label>

    </div>

    <div class="settings-card">

        <h3>🔐 Security</h3>

        <button class="settings-btn">

            Set PIN

        </button>

    </div>

    <div class="settings-card">

        <h3>🤖 Melo AI</h3>

        <label>

            <input type="checkbox" id="voiceSwitch">

            Voice Assistant

        </label>

    </div>

    <div class="settings-card">

        <h3>ℹ️ About</h3>

        <p>MELOSAV Version 3.0</p>

    </div>

</div>

<script src="storage.js"></script>
<script src="theme.js"></script>
<script src="settings.js"></script>

</body>

</html>
