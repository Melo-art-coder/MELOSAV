<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Recent Transactions | MeloSave</title>

<link rel="stylesheet" href="home.css">

<style>

body{
    background:var(--bg);
    color:var(--text);
    padding:20px;
    transition:.3s;
}

.transactions-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

}

.back-btn{

    text-decoration:none;

    background:#7B2CFF;

    color:#fff;

    padding:10px 18px;

    border-radius:12px;

    font-weight:600;

}

#transactionList{

    list-style:none;

    padding:0;

}

.transaction-card{

    background:#fff;

    border-radius:20px;

    padding:18px;

    margin-bottom:15px;

    box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.transaction-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:8px;

}

.transaction-title{

    font-size:17px;

    font-weight:700;

}

.transaction-date{

    color:#888;

    font-size:13px;

}

.transaction-amount{

    color:#7B2CFF;

    font-size:20px;

    font-weight:700;

}
.transaction-tools{

margin-bottom:20px;

}

#searchTransaction{

width:100%;

padding:14px;

border:none;

border-radius:15px;

font-size:15px;

margin-bottom:15px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

outline:none;

}

.filter-row{

display:flex;

gap:10px;

overflow-x:auto;

padding-bottom:8px;

}

.filter-btn{

border:none;

padding:10px 18px;

border-radius:20px;

background:#E9E4FF;

color:#6B2BFF;

font-weight:600;

cursor:pointer;

white-space:nowrap;

}

.filter-btn.active{

background:#7B2CFF;

color:#fff;

}

</style>

</head>

<body>

<div class="transactions-header">

<h1>📄 Recent Transactions</h1>

<a href="home.html" class="back-btn">

← Home

</a>

</div>
<div class="transaction-tools">

<input
type="search"
id="searchTransaction"
placeholder="🔍 Search recipient, type...">

<div class="filter-row">

<button class="filter-btn active" data-filter="all">
All
</button>

<button class="filter-btn" data-filter="income">
Income
</button>

<button class="filter-btn" data-filter="saving">
Savings
</button>

<button class="filter-btn" data-filter="transfer">
Transfer
</button>

<button class="filter-btn" data-filter="airtime">
Airtime
</button>

<button class="filter-btn" data-filter="data">
Data
</button>

</div>

</div>

<ul id="transactionList">

</ul>

<script src="storage.js"></script>
<script src="notifications.js"></script>
<script src="auth.js"></script>
<script src="transactions.js"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const list = document.getElementById("transactionList");
    const search = document.getElementById("searchTransaction");
    const buttons = document.querySelectorAll(".filter-btn");

    const user = getCurrentUser();

    if (!user) return;

    let currentFilter = "all";

    function renderTransactions() {

        list.innerHTML = "";

        let transactions = [...user.data.transactions];

        // Filter
        if (currentFilter !== "all") {
            transactions = transactions.filter(
                item => item.type === currentFilter
            );
        }

        // Search
        const keyword = search.value.toLowerCase();

        if (keyword !== "") {

            transactions = transactions.filter(item => {

                return (
                    (item.type || "").toLowerCase().includes(keyword) ||
                    (item.recipient || "").toLowerCase().includes(keyword) ||
                    (item.network || "").toLowerCase().includes(keyword) ||
                    (item.phone || "").toLowerCase().includes(keyword)
                );

            });

        }

        if (transactions.length === 0) {

            list.innerHTML = "<h3>No transactions found 💜</h3>";

            return;

        }

        transactions.forEach(item => {

            let icon = "💜";

            if (item.type === "income") icon = "💰";
            if (item.type === "saving") icon = "🏦";
            if (item.type === "transfer") icon = "💸";
            if (item.type === "airtime") icon = "📱";
            if (item.type === "data") icon = "📶";

            list.innerHTML += `
                <li class="transaction-card">

                    <div class="transaction-top">

                        <div class="transaction-title">
                            ${icon} ${item.type.toUpperCase()}
                        </div>

                        <div class="transaction-date">
                            ${item.date}
                        </div>

                    </div>

                    <div class="transaction-amount">
                        ₦${Number(item.amount).toLocaleString()}
                    </div>

                </li>
            `;

        });

    }

    renderTransactions();

    search.addEventListener("input", renderTransactions);

    buttons.forEach(btn => {

        btn.addEventListener("click", () => {

            buttons.forEach(b => b.classList.remove("active"));

            btn.classList.add("active");

            currentFilter = btn.dataset.filter;

            renderTransactions();

        });

    });

});

</script>

</body>

</html>
