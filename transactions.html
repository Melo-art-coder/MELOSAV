<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Recent Transactions | MeloSave</title>

<link rel="stylesheet" href="home.css">
<link rel="stylesheet" href="theme.css">
<style>
:root{

--bg:#F5F2FF;
--card:#FFFFFF;
--text:#222222;
--subtext:#888888;

--primary:#7B2CFF;
--primary-light:#E9E4FF;

--border:#ECECEC;

--shadow:0 10px 25px rgba(0,0,0,.08);

}

body.dark-mode{

--bg:#121212;

--card:#1E1E1E;

--text:#F5F5F5;

--subtext:#B5B5B5;

--primary:#9D6BFF;

--primary-light:#35215F;

--border:#2C2C2C;

--shadow:0 10px 30px rgba(0,0,0,.35);

}

/* ===========================
   BODY
=========================== */

body{

background:var(--bg);

color:var(--text);

padding:20px;

font-family:Arial,sans-serif;

transition:.35s ease;

}

/* ===========================
   HEADER
=========================== */

.transactions-header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

}

.transactions-header h1{

color:var(--text);

font-size:28px;

font-weight:700;

}

.back-btn{

text-decoration:none;

background:var(--primary);

color:#fff;

padding:12px 18px;

border-radius:14px;

font-weight:600;

transition:.3s;

}

.back-btn:hover{

transform:translateY(-2px);

}

/* ===========================
   SEARCH + FILTER
=========================== */

.transaction-tools{

margin-bottom:20px;

}

#searchTransaction{

width:100%;

padding:15px;

border:none;

border-radius:16px;

background:var(--card);

color:var(--text);

box-shadow:var(--shadow);

outline:none;

font-size:15px;

margin-bottom:16px;

transition:.3s;

}

#searchTransaction::placeholder{

color:var(--subtext);

}

.filter-row{

display:flex;

gap:10px;

overflow-x:auto;

padding-bottom:6px;

}

.filter-row::-webkit-scrollbar{

display:none;

}

.filter-btn{

border:none;

background:var(--primary-light);

color:var(--primary);

padding:10px 18px;

border-radius:999px;

font-weight:600;

cursor:pointer;

white-space:nowrap;

transition:.25s;

}

.filter-btn.active{

background:var(--primary);

color:#fff;

}
/* ===========================
   TRANSACTION LIST
=========================== */

#transactionList{

list-style:none;

padding:0;

margin:0;

}

.transaction-card{

background:var(--card);

border:1px solid var(--border);

border-radius:22px;

padding:18px;

margin-bottom:16px;

box-shadow:var(--shadow);

transition:.3s ease;

}

.transaction-card:hover{

transform:translateY(-2px);

}

.transaction-top{

display:flex;

justify-content:space-between;

align-items:flex-start;

margin-bottom:10px;

gap:10px;

}

.transaction-title{

font-size:17px;

font-weight:700;

color:var(--text);

}

.transaction-date{

font-size:13px;

color:var(--subtext);

text-align:right;

}

.transaction-amount{

font-size:22px;

font-weight:700;

color:var(--primary);

margin-top:8px;

}

/* ===========================
   EMPTY STATE
=========================== */

#transactionList h3{

text-align:center;

color:var(--subtext);

margin-top:60px;

font-weight:600;

}

/* ===========================
   RESPONSIVE
=========================== */

@media (max-width:600px){

.transactions-header h1{

font-size:24px;

}

.back-btn{

padding:10px 15px;

font-size:14px;

}

.transaction-title{

font-size:16px;

}

.transaction-amount{

font-size:20px;

}

}

</style>

</head>

<body>

<div class="transactions-header">

<h1>📄 Recent Transactions</h1>

<a href="home.html" class="back-btn">

← Home

</a>

</div>
<div class="transaction-tools">

<input
type="search"
id="searchTransaction"
placeholder="🔍 Search recipient, type...">

<div class="filter-row">

<button class="filter-btn active" data-filter="all">
All
</button>

<button class="filter-btn" data-filter="income">
Income
</button>

<button class="filter-btn" data-filter="saving">
Savings
</button>

<button class="filter-btn" data-filter="transfer">
Transfer
</button>

<button class="filter-btn" data-filter="airtime">
Airtime
</button>

<button class="filter-btn" data-filter="data">
Data
</button>

</div>

</div>

<ul id="transactionList">

</ul>

<script src="storage.js"></script>
<script src="notifications.js"></script>
<script src="auth.js"></script>
<script src="transactions.js"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const list = document.getElementById("transactionList");
    const search = document.getElementById("searchTransaction");
    const buttons = document.querySelectorAll(".filter-btn");

    const user = getCurrentUser();

    if (!user) return;

    let currentFilter = "all";

    function renderTransactions() {

        list.innerHTML = "";

        let transactions = [...user.data.transactions];

        // Filter
        if (currentFilter !== "all") {
            transactions = transactions.filter(
                item => item.type === currentFilter
            );
        }

        // Search
        const keyword = search.value.toLowerCase();

        if (keyword !== "") {

            transactions = transactions.filter(item => {

                return (
                    (item.type || "").toLowerCase().includes(keyword) ||
                    (item.recipient || "").toLowerCase().includes(keyword) ||
                    (item.network || "").toLowerCase().includes(keyword) ||
                    (item.phone || "").toLowerCase().includes(keyword)
                );

            });

        }

        if (transactions.length === 0) {

            list.innerHTML = "<h3>No transactions found 💜</h3>";

            return;

        }

        transactions.forEach(item => {

            let icon = "💜";

            if (item.type === "income") icon = "💰";
            if (item.type === "saving") icon = "🏦";
            if (item.type === "transfer") icon = "💸";
            if (item.type === "airtime") icon = "📱";
            if (item.type === "data") icon = "📶";

            list.innerHTML += `
                <li class="transaction-card">

                    <div class="transaction-top">

                        <div class="transaction-title">
                            ${icon} ${item.type.toUpperCase()}
                        </div>

                        <div class="transaction-date">
                            ${item.date}
                        </div>

                    </div>

                    <div class="transaction-amount">
                        ₦${Number(item.amount).toLocaleString()}
                    </div>

                </li>
            `;

        });

    }

    renderTransactions();

    search.addEventListener("input", renderTransactions);

    buttons.forEach(btn => {

        btn.addEventListener("click", () => {

            buttons.forEach(b => b.classList.remove("active"));

            btn.classList.add("active");

            currentFilter = btn.dataset.filter;

            renderTransactions();

        });

    });

});

</script>

</body>

</html>
